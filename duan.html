<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>卦师解卦</title>
  <style>
    body { margin:0; font-family: "Microsoft YaHei", sans-serif; background:#f5efe3; color:#222; }
    .page { min-height:100vh; display:flex; flex-direction:column; }
    .topbar { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .wrap { flex:1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; padding:16px; box-sizing:border-box; }
    .panel { background:#fff; border-radius:12px; padding:16px; box-shadow:0 4px 14px rgba(0,0,0,0.08); overflow:auto; }
    .panel:last-child { grid-column:1/-1; }
    .panel h3 { margin-top:0; }
    .title { font-size:24px; font-weight:bold; margin-bottom:12px; color:#8a3d0f; }
    .line { font-size:16px; line-height:1.8; margin-bottom:8px; }
    .label { display:inline-block; min-width:76px; font-weight:bold; color:#0b72d6; margin-right:8px; }
    .empty { color:#777; }
    @media (max-width:900px) { .wrap { grid-template-columns:1fr; } .panel:last-child { grid-column:auto; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div><strong>卦师解卦</strong></div>
      <a href="index.html" style="color:#0b72d6;text-decoration:none;">返回首页</a>
    </div>
    <div class="wrap">
      <div class="panel">
        <h3>本卦（开始）</h3>
        <div id="panel-ben"></div>
      </div>
      <div class="panel">
        <h3>互卦（过程）</h3>
        <div id="panel-hu"></div>
      </div>
      <div class="panel">
        <h3>变卦（结局）</h3>
        <div id="panel-bian"></div>
      </div>
      <div class="panel">
        <h3>解卦</h3>
        <div id="panel-duan"></div>
      </div>
    </div>
  </div>

  <script src="./static/js/data.js"></script>
  <script src="./static/js/duan.js"></script>
</body>
</html>
