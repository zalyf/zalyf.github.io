<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>卦师解卦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./static/css/site.css">
  <link rel="stylesheet" href="./static/css/effects.css">
  <style>
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: 24px;
    }

    .topbar {
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top, 0px));
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar strong {
      font-family: var(--font-brush);
      font-size: clamp(1.2rem, 4vw, 1.45rem);
      letter-spacing: 0.15em;
      font-weight: 400;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      border-radius: 0 !important;
    }

    .panel {
      padding: 16px 14px 18px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255, 252, 248, 0.88);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .panel h3 {
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      font-family: var(--font-brush);
      letter-spacing: 0.14em;
      font-size: clamp(1.1rem, 3.5vw, 1.3rem);
      text-align: center;
      color: #2a2218;
    }

    .panel-stage {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #8a7a68;
      text-align: center;
      margin: -6px 0 10px;
      font-family: var(--font-brush);
    }

    /* 解卦置顶 */
    .panel-duan {
      order: 0;
      width: 100%;
    }

    /* 三卦横排在下 */
    .gua-row {
      order: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    /* 卦卡内容 */
    .hex-name {
      text-align: center;
      font-family: var(--font-brush);
      font-size: clamp(1.25rem, 4vw, 1.55rem);
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      margin: 0 0 12px;
      color: #1a4a7a;
    }
    .hex-name a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed rgba(26, 74, 122, 0.4);
      cursor: pointer;
    }
    .hex-name a:hover {
      color: #0b72d6;
      border-bottom-style: solid;
    }

    .kv-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 4.5em 1fr;
      gap: 6px 10px;
      align-items: start;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.04);
      font-size: 14px;
      line-height: 1.5;
    }
    .kv-row .k {
      font-family: var(--font-brush);
      letter-spacing: 0.1em;
      color: #6a5a48;
    }
    .kv-row .v { color: #222; word-break: break-word; }

    .rel-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(11, 114, 214, 0.1);
      color: #0b5cad;
      font-family: var(--font-brush);
      letter-spacing: 0.08em;
      font-size: 0.95rem;
    }

    .wx-tag {
      display: inline-block;
      margin-left: 4px;
      padding: 0 6px;
      border-radius: 4px;
      background: rgba(140, 100, 40, 0.1);
      color: #7a5a28;
      font-size: 12px;
    }

    .desc-mini {
      margin-top: 4px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 252, 245, 0.95);
      border: 1px solid rgba(180, 140, 60, 0.15);
      font-size: 14px;
      line-height: 1.65;
      color: #333;
      max-height: 6.5em;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .gua-thumb {
      display: block;
      max-width: min(100%, 200px);
      max-height: 28vh;
      width: auto;
      height: auto;
      margin: 12px auto 0;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
      cursor: zoom-in;
    }

    /* 解卦区 */
    .duan-title {
      font-family: var(--font-brush);
      font-size: clamp(1.25rem, 4vw, 1.6rem);
      letter-spacing: 0.1em;
      line-height: 1.4;
      margin: 0 0 14px;
      color: #6b3a10;
      text-align: center;
    }
    .duan-quote {
      padding: 14px 16px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255, 248, 230, 0.95), rgba(255, 255, 255, 0.85));
      border: 1px solid rgba(180, 140, 60, 0.22);
      color: #2a2218;
      text-align: center;
      margin-bottom: 14px;
    }
    .duan-quote-main {
      font-family: var(--font-brush);
      font-size: clamp(1.1rem, 3.5vw, 1.3rem);
      letter-spacing: 0.08em;
      line-height: 1.7;
    }
    .duan-quote-sub {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(140, 110, 60, 0.28);
      font-family: var(--font-brush);
      font-size: clamp(1rem, 3.2vw, 1.15rem);
      letter-spacing: 0.06em;
      line-height: 1.7;
      color: #3a3228;
      opacity: 0.92;
    }
    .duan-body {
      font-size: 15px;
      line-height: 1.75;
      color: #333;
    }
    .duan-body p { margin: 0 0 10px; }
    .duan-scenes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }
    .duan-scene {
      padding: 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 0, 0, 0.05);
      font-size: 14px;
      line-height: 1.6;
    }
    .duan-scene .scene-h {
      font-family: var(--font-brush);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      color: #4a3a28;
      font-size: 0.98rem;
    }

    .empty {
      color: #999;
      text-align: center;
      padding: 20px 8px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .wrap {
        padding: 12px;
        gap: 12px;
      }
      .gua-row {
        grid-template-columns: 1fr;
      }
      .duan-scenes {
        grid-template-columns: repeat(2, 1fr);
      }
      .desc-mini {
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      .duan-scenes {
        grid-template-columns: 1fr;
      }
    }

    /* 功德弹窗 */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 16px;
    }
    .modal-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 14px;
      padding: 22px 18px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.32);
      text-align: center;
      border-top: 4px solid #8a5a20;
    }
    .modal-box h2 {
      margin: 0 0 8px;
      font-family: var(--font-brush);
      color: #2a2218;
      font-size: clamp(1.2rem, 4vw, 1.4rem);
      letter-spacing: 0.12em;
      font-weight: 400;
    }
    .modal-content { margin: 16px 0 18px; }
    .warning-text {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      background: #fdf8e2;
      border-left: 3px solid #d4a017;
      padding: 12px;
      border-radius: 6px;
      text-align: left;
    }
    .qr-container { margin-top: 16px; }
    .qr-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .qr-item {
      flex: 0 1 150px;
      max-width: 46%;
    }
    .qr-code {
      width: 100%;
      max-width: 150px;
      height: auto;
      aspect-ratio: 1;
      object-fit: contain;
      border: 1px solid #eee;
      padding: 4px;
      border-radius: 8px;
      cursor: zoom-in;
      background: #fff;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }
    .qr-code:hover {
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }
    .qr-label {
      margin-top: 6px;
      font-size: 13px;
      color: #555;
      font-family: var(--font-brush);
      letter-spacing: 0.1em;
    }
    .qr-tip {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
      font-family: var(--font-brush);
      letter-spacing: 0.08em;
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background-color: #0b72d6;
      color: #fff;
      font-size: 1.05rem;
      font-family: var(--font-brush);
      letter-spacing: 0.08em;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled {
      background-color: #c8c8c8;
      color: #666;
      cursor: not-allowed;
    }
    .btn-primary.is-ready {
      background-color: #c27803;
    }

    #imageModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      align-items: center;
      justify-content: center;
      z-index: 13000;
      padding: 16px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="gongde-modal" class="modal-mask" role="dialog" aria-modal="true" aria-labelledby="gongde-title">
      <div class="modal-box">
        <h2 id="gongde-title">☯️ 乾坤有数 · 卦不空回</h2>
        <div class="modal-content">
          <p class="warning-text">
            本系统深度断语已接入能量对倒机制。<br>
            随缘随喜，落子无悔。付多付少皆是功德，不付亦不强求；由此引发的因果，需由求测者自行承载。
          </p>
          <div class="qr-container">
            <div class="qr-row">
              <div class="qr-item">
                <img src="./static/images/wei.jpg" alt="微信支付" class="qr-code" title="点击放大">
                <div class="qr-label">微信支付</div>
              </div>
              <div class="qr-item">
                <img src="./static/images/zhi.jpg" alt="支付宝" class="qr-code" title="点击放大">
                <div class="qr-label">支付宝</div>
              </div>
            </div>
            <p class="qr-tip">扫码随缘随喜 · 点击图片可放大</p>
          </div>
        </div>
        <button id="btn-unlock" class="btn-primary" type="button" disabled>请稍候 (10s)</button>
      </div>
    </div>

    <div class="topbar">
      <div><strong>卦师解卦</strong></div>
      <div class="topbar-actions">
        <a class="meihua-btn" href="meihua_result.html">← 结果</a>
        <a class="meihua-btn" href="index.html">首页</a>
      </div>
    </div>

    <div class="wrap">
      <div class="panel panel-duan">
        <h3>解卦</h3>
        <div id="panel-duan"></div>
      </div>
      <div class="gua-row">
        <div class="panel">
          <h3>本卦</h3>
          <div class="panel-stage">开始 · 体用</div>
          <div id="panel-ben"></div>
        </div>
        <div class="panel">
          <h3>互卦</h3>
          <div class="panel-stage">过程 · 上下</div>
          <div id="panel-hu"></div>
        </div>
        <div class="panel">
          <h3>变卦</h3>
          <div class="panel-stage">结局 · 体用</div>
          <div id="panel-bian"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="imageModal">
    <div style="position:relative;max-width:95vw;max-height:90vh;">
      <button id="imageModalClose" type="button" aria-label="关闭"
        style="position:absolute;right:-4px;top:-40px;background:transparent;border:0;color:#fff;font-size:32px;width:44px;height:44px;cursor:pointer;">×</button>
      <img id="imageModalImg" src="" alt="查看图片"
        style="max-width:95vw;max-height:85vh;width:auto;height:auto;object-fit:contain;display:block;margin:0 auto;">
    </div>
  </div>

  <script src="./static/js/site.js"></script>
  <script src="./static/js/effects.js"></script>
  <script src="./static/js/data.js"></script>
  <script src="./static/js/duan.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var modal = document.getElementById('gongde-modal');
      var unlockBtn = document.getElementById('btn-unlock');
      var timeLeft = 10;

      var timer = setInterval(function () {
        timeLeft--;
        if (timeLeft > 0) {
          unlockBtn.textContent = '请稍候 (' + timeLeft + 's)';
        } else {
          clearInterval(timer);
          unlockBtn.removeAttribute('disabled');
          unlockBtn.textContent = '已付随缘卦金 / 自承因果，诚信解锁';
          unlockBtn.classList.add('is-ready');
        }
      }, 1000);

      unlockBtn.addEventListener('click', function () {
        if (unlockBtn.disabled) return;
        modal.style.display = 'none';
      });

      // 图片灯箱
      function openImage(src) {
        var m = document.getElementById('imageModal');
        var im = document.getElementById('imageModalImg');
        if (!m || !im) return;
        im.src = src;
        m.style.display = 'flex';
      }
      function closeImage() {
        var m = document.getElementById('imageModal');
        if (m) m.style.display = 'none';
      }
      var imgClose = document.getElementById('imageModalClose');
      if (imgClose) imgClose.addEventListener('click', closeImage);
      var imgModal = document.getElementById('imageModal');
      if (imgModal) {
        imgModal.style.zIndex = '14000';
        imgModal.addEventListener('click', function (e) {
          if (e.target.id === 'imageModal') closeImage();
        });
      }
      document.addEventListener('click', function (e) {
        var t = e.target;
        if (!t || !t.classList) return;
        if (t.classList.contains('gua-thumb') || t.classList.contains('qr-code')) {
          openImage(t.src);
        }
      });
    });
  </script>
</body>

</html>
