<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>易</title>
    <link rel="stylesheet" href="./static/css/yi.css">
    <style>
        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            /* lightweight SVG placeholder shown first for slow networks */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="60"><rect width="100%" height="100%" fill="%23efece6"/><rect x="0" y="40" width="100%" height="20" fill="%23e0d7cc"/></svg>') center center / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .center-pane {
            background: rgba(255, 255, 255, 0.85);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            min-width: 260px
        }

        .center-pane h1 {
            margin: 0 0 8px 0;
            font-size: 20px
        }

        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            align-items: center;
        }

        .btn-row a {
            display: inline-block;
            text-align: center;
            padding: 10px 20px;
            border-radius: 8px;
            background: #0b72d6;
            color: #fff;
            text-decoration: none;
            min-width: 180px;
            max-width: 90%;
        }

        @media (min-width:520px) {
            .btn-row {
                /* keep one button per row on wider screens */
                flex-direction: column;
            }

            .btn-row a {
                flex: none;
            }
        }
    </style>
</head>

<body>
    <div class="center-pane">
        <h1>周易</h1>
        <div class="btn-row">
            <a id="before" href="before.html">占卜须知</a>
            <a id="zy64btn" href="zy64gua.html">易经全卦☯</a>
            <a id="meihuaBtn" href="javascript:meihuaTianshi();">天时起卦☯</a>
            <a id="bubtn2" href="javascript:meihuaXinShi();">心事起卦☯</a>
        </div>
    </div>

    <script src="./static/js/yi.js"></script>
    <script>
        // progressive background loader: keep lightweight placeholder, then swap in R.jpg when available
        (function () {
            var full = './static/images/R.jpg';
            var img = new Image();
            img.src = full;
            img.onload = function () {
                document.body.style.backgroundImage = 'url("' + full + '")';
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center center';
                document.body.style.backgroundRepeat = 'no-repeat';
                document.body.style.backgroundAttachment = 'fixed';
            };
            img.onerror = function () {
                // failed to load full image; keep placeholder
                console.warn('Background image failed to load:', full);
            };
        })();
    </script>
    <footer
        style="width:100%;padding:12px 16px;box-sizing:border-box;position:fixed;bottom:6px;left:0;display:flex;justify-content:center;gap:12px;align-items:center;">
        <div style="color:gray;font-size:14px;">弘扬国学，科学算卦</div>
        <a href="index3.html" id="oldEntry" style="color:#0077cc;text-decoration:none;margin-left:8px;">旧版入口</a>
        <a href="#" id="supportLink" style="color:#0077cc;text-decoration:none;margin-left:8px;">卦金随缘，感谢支持</a>
    </footer>

    <script>
        (function () {
            var supportImgs = ['static/images/wei.jpg', 'static/images/zhi.jpg'];
            function openSupport() {
                var idx = Math.floor(Math.random() * supportImgs.length);
                var img = document.getElementById('supportImg');
                img.src = supportImgs[idx];
                document.getElementById('supportModal').style.display = 'flex';
            }
            function closeSupport() { document.getElementById('supportModal').style.display = 'none'; }

            // 占卜须知 modal
            function openBefore() {
                document.getElementById('beforeModal').style.display = 'flex';
            }
            function closeBefore() { document.getElementById('beforeModal').style.display = 'none'; }

            document.addEventListener('DOMContentLoaded', function () {
                var link = document.getElementById('supportLink');
                if (link) link.addEventListener('click', function (e) { e.preventDefault(); openSupport(); });
                var closeBtn = document.getElementById('supportClose'); if (closeBtn) closeBtn.addEventListener('click', closeSupport);
                var modal = document.getElementById('supportModal'); if (modal) modal.addEventListener('click', function (e) { if (e.target.id === 'supportModal') closeSupport(); });

                var beforeLink = document.getElementById('before');
                if (beforeLink) beforeLink.addEventListener('click', function(e){ e.preventDefault(); openBefore(); });
                var beforeClose = document.getElementById('beforeClose'); if (beforeClose) beforeClose.addEventListener('click', closeBefore);
                var beforeModal = document.getElementById('beforeModal'); if (beforeModal) beforeModal.addEventListener('click', function(e){ if (e.target.id === 'beforeModal') closeBefore(); });
            });
        })();
    </script>

    <div id="supportModal"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:12000;">
        <div
            style="position:relative;background:#fff;border-radius:8px;padding:12px;max-width:720px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
            <button id="supportClose"
                style="position:absolute;right:8px;top:6px;background:transparent;border:0;font-size:28px;line-height:1;cursor:pointer;">×</button>
            <img id="supportImg" src="" alt="感谢支持" style="display:block;max-width:50%;height:auto;margin:0 auto;">
        </div>
    </div>

        <!-- 占卜须知 modal -->
        <div id="beforeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:12500;">
            <div style="position:relative;background:#fff;border-radius:8px;padding:18px;max-width:420px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.25);text-align:center;">
                <button id="beforeClose" style="position:absolute;right:8px;top:6px;background:transparent;border:0;font-size:24px;line-height:1;cursor:pointer;">×</button>
                <h3 style="margin-top:6px;margin-bottom:8px;">占卜须知</h3>
                <div style="font-size:16px;color:#222;line-height:1.8;">
                    <div>不疑不卜</div>
                    <div>不诚不卜</div>
                    <div>不信不卜</div>
                </div>
            </div>
        </div>
</body>

</html>
