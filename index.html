<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>易</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/site.css">
    <link rel="stylesheet" href="./static/css/yi.css">
    <link rel="stylesheet" href="./static/css/effects.css">
    <style>
        /* 首页专属：标题 / 太极菜单 / 须知 / 透明按钮 */
        .site-title {
            position: fixed;
            top: max(14px, env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 16;
            margin: 0;
            padding: 0;
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            font-size: clamp(2.1rem, 8vw, 3rem);
            letter-spacing: 0.55em;
            text-indent: 0.55em;
            line-height: 1.1;
            color: rgba(22, 18, 14, 0.88);
            text-shadow:
                0.5px 0.5px 0 rgba(20, 16, 12, 0.3),
                0 2px 12px rgba(255, 255, 255, 0.35);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }

        /* 按钮叠在太极正中（由 .hero-stage 共同居中） */
        .center-pane {
            background: transparent;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* 占卜须知：页面下方，毛笔字风竖排（端正，无倾斜） */
        .zhanbu-motto {
            position: fixed;
            left: 50%;
            bottom: calc(46px + env(safe-area-inset-bottom, 0px));
            top: auto;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-end;
            gap: clamp(2.6rem, 9vw, 4.5rem);
            pointer-events: none;
            z-index: 15;
            user-select: none;
            max-height: min(42vh, 280px);
        }

        .zhanbu-motto .motto-line {
            margin: 0;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: clamp(1.45rem, 5vw, 2.2rem);
            letter-spacing: 0.42em;
            line-height: 1.05;
            color: rgba(22, 18, 14, 0.8);
            text-shadow:
                0.5px 0.5px 0 rgba(20, 16, 12, 0.35),
                -0.4px 0.6px 0 rgba(20, 16, 12, 0.18),
                0 0 0.5px rgba(10, 8, 6, 0.45),
                1px 2px 3px rgba(40, 32, 24, 0.12);
            filter: none;
            opacity: 0.92;
            white-space: nowrap;
            transform: none;
        }

        /* 三列仅保留极轻浓淡差，不再旋转/位移 */
        .zhanbu-motto .motto-line:nth-child(1) {
            opacity: 0.88;
            color: rgba(28, 22, 18, 0.76);
        }
        .zhanbu-motto .motto-line:nth-child(2) {
            opacity: 0.95;
            color: rgba(18, 14, 12, 0.88);
            font-size: clamp(1.55rem, 5.2vw, 2.3rem);
        }
        .zhanbu-motto .motto-line:nth-child(3) {
            opacity: 0.88;
            color: rgba(28, 22, 18, 0.76);
        }

        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
            justify-content: center;
        }

        /* 全透明按钮（试看效果）：无边框、无背景 */
        .btn-row a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 14px 22px;
            border-radius: 999px;
            background: transparent;
            color: rgba(22, 18, 14, 0.92);
            text-decoration: none;
            width: 100%;
            max-width: 100%;
            min-height: 50px;
            font-size: clamp(1.35rem, 4.5vw, 1.75rem);
            letter-spacing: 0.18em;
            box-sizing: border-box;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.55),
                0 0 10px rgba(255, 252, 248, 0.35);
            transition: transform 0.22s ease, opacity 0.22s ease;
            animation: menu-btn-float 5.5s ease-in-out infinite;
        }

        .btn-row a:nth-child(1) { animation-delay: 0s; }
        .btn-row a:nth-child(2) { animation-delay: 0.35s; }
        .btn-row a:nth-child(3) { animation-delay: 0.7s; }

        .btn-row a:hover,
        .btn-row a:focus-visible {
            transform: translateY(-4px) scale(1.02);
            background: transparent;
            border: none;
            box-shadow: none;
            outline: none;
            opacity: 0.85;
            animation-play-state: paused;
        }

        .btn-row a:active {
            transform: translateY(0) scale(0.98);
            background: transparent;
            box-shadow: none;
        }

        @keyframes menu-btn-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .btn-row a {
                animation: none;
            }
        }

        @media (max-width: 380px) {
            .btn-row a {
                font-size: clamp(1.2rem, 5vw, 1.45rem);
                padding: 12px 14px;
                letter-spacing: 0.12em;
                min-height: 46px;
            }

            .btn-row {
                gap: 10px;
            }
        }
    </style>
</head>

<body class="index-page">
    <!-- SVG defs for soft ink wash (filters) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <filter id="ink-soft" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur" />
                <feBlend in="SourceGraphic" in2="blur" mode="normal" />
            </filter>
        </defs>
    </svg>

    <!-- 页面上方：横向毛笔标题 -->
    <h1 class="site-title">周易</h1>

    <!-- 太极 + 三按钮：同一舞台中心对齐 -->
    <div class="hero-stage">
        <div class="taiji-wrap" aria-hidden="true">
            <div class="taiji-glow"></div>
            <!--
              标准太极：左白右黑 + 上白下黑双半圆 = S 形阴阳鱼
              鱼眼必须为实心：阳鱼（白）中阴眼（黑），阴鱼（黑）中阳眼（白）
            -->
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="taijiClip">
                        <circle cx="100" cy="100" r="96"/>
                    </clipPath>
                    <!-- 外缘墨晕：由实到虚，避免粗硬描边 -->
                    <radialGradient id="taijiEdgeFade" cx="50%" cy="50%" r="50%">
                        <stop offset="86%" stop-color="#111111" stop-opacity="0"/>
                        <stop offset="94%" stop-color="#111111" stop-opacity="0.12"/>
                        <stop offset="100%" stop-color="#111111" stop-opacity="0.28"/>
                    </radialGradient>
                </defs>
                <g clip-path="url(#taijiClip)">
                    <!-- 左阳（白）右阴（黑） -->
                    <rect x="0" y="0" width="100" height="200" fill="#ffffff"/>
                    <rect x="100" y="0" width="100" height="200" fill="#111111"/>
                    <!-- 上：阳鱼头（白） -->
                    <circle cx="100" cy="52" r="48" fill="#ffffff"/>
                    <!-- 下：阴鱼头（黑） -->
                    <circle cx="100" cy="148" r="48" fill="#111111"/>
                    <!-- 阴眼：阳中之阴，实心黑 -->
                    <circle cx="100" cy="52" r="16" fill="#111111"/>
                    <!-- 阳眼：阴中之阳，实心白 -->
                    <circle cx="100" cy="148" r="16" fill="#ffffff"/>
                </g>
                <!-- 极细轮廓 + 外侧柔和过渡（非粗边框） -->
                <circle cx="100" cy="100" r="96" fill="none" stroke="#111111" stroke-width="0.75" stroke-opacity="0.35"/>
                <circle cx="100" cy="100" r="96" fill="url(#taijiEdgeFade)"/>
            </svg>
        </div>

        <div class="center-pane">
            <div class="btn-row">
                <a id="zy64btn" href="zy64gua.html">易经全卦☯</a>
                <a id="meihuaBtn" href="javascript:meihuaTianshi();">天时起卦☯</a>
                <a id="bubtn2" href="javascript:meihuaXinShi();">心事起卦☯</a>
            </div>
        </div>
    </div>

    <script src="./static/js/site.js"></script>
    <script src="./static/js/effects.js"></script>
    <script src="./static/js/yi.js"></script>

    <!-- 占卜须知：页面下方竖排毛笔字 -->
    <div class="zhanbu-motto" aria-label="占卜须知：不疑不卜，不诚不卜，不信不卜">
        <p class="motto-line">不疑不卜</p>
        <p class="motto-line">不诚不卜</p>
        <p class="motto-line">不信不卜</p>
    </div>

    <footer class="site-footer">
        <div class="tagline">弘扬国学，科学算卦</div>
        <a href="#" id="supportLink">卦金随缘，感谢支持</a>
    </footer>

    <script>
        (function () {
            var supportImgs = ['static/images/wei.jpg', 'static/images/zhi.jpg'];
            function openSupport() {
                var idx = Math.floor(Math.random() * supportImgs.length);
                var img = document.getElementById('supportImg');
                img.src = supportImgs[idx];
                document.getElementById('supportModal').style.display = 'flex';
            }
            function closeSupport() { document.getElementById('supportModal').style.display = 'none'; }

            document.addEventListener('DOMContentLoaded', function () {
                var link = document.getElementById('supportLink');
                if (link) link.addEventListener('click', function (e) { e.preventDefault(); openSupport(); });
                var closeBtn = document.getElementById('supportClose'); if (closeBtn) closeBtn.addEventListener('click', closeSupport);
                var modal = document.getElementById('supportModal'); if (modal) modal.addEventListener('click', function (e) { if (e.target.id === 'supportModal') closeSupport(); });
            });
        })();
    </script>

    <div id="supportModal"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:12000;padding:16px;box-sizing:border-box;">
        <div
            style="position:relative;background:#fff;border-radius:10px;padding:14px;max-width:720px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
            <button id="supportClose" type="button" aria-label="关闭"
                style="position:absolute;right:4px;top:2px;background:transparent;border:0;font-size:28px;line-height:1;cursor:pointer;width:44px;height:44px;">×</button>
            <img id="supportImg" src="" alt="感谢支持" style="display:block;max-width:min(50%,280px);width:100%;height:auto;margin:0 auto;">
        </div>
    </div>
</body>

</html>
