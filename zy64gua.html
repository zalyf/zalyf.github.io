<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>周易64卦</title>
        <link rel="icon" href="./static/images/logo.png" type="image/x-icon" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./static/css/site.css">
        <link rel="stylesheet" href="./static/css/yi.css">
        <link rel="stylesheet" href="./static/css/effects.css">
        <style>
            body {
                padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            }
            .zy64-header .title {
                font-size: clamp(1.2rem, 4.5vw, 1.5rem);
                letter-spacing: 0.2em;
            }
            .gua64 {
                background: rgba(255, 255, 255, 0.78);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
            }
            .name64 {
                font-family: var(--font-brush);
                letter-spacing: 0.08em;
            }

            /* 搜索 */
            .zy64-search-wrap {
                position: sticky;
                top: 56px;
                z-index: 9;
                padding: 10px 14px 12px;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                box-sizing: border-box;
            }
            .zy64-search {
                position: relative;
                max-width: 720px;
                margin: 0 auto;
            }
            .zy64-search input {
                width: 100%;
                box-sizing: border-box;
                min-height: 46px;
                padding: 10px 14px;
                border: 1px solid rgba(0, 0, 0, 0.12);
                border-radius: 12px;
                font-size: 16px;
                font-family: var(--font-brush), "PingFang SC", "Microsoft YaHei", sans-serif;
                letter-spacing: 0.08em;
                outline: none;
                background: rgba(255, 255, 255, 0.95);
                color: #222;
            }
            .zy64-search input:focus {
                border-color: rgba(11, 114, 214, 0.55);
                box-shadow: 0 0 0 3px rgba(11, 114, 214, 0.12);
            }
            .zy64-search input::placeholder {
                color: #999;
                letter-spacing: 0.06em;
            }
            .zy64-suggest {
                display: none;
                position: absolute;
                left: 0;
                right: 0;
                top: calc(100% + 4px);
                max-height: min(50vh, 320px);
                overflow-y: auto;
                background: #fff;
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 12px;
                box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
                z-index: 20;
            }
            .zy64-suggest.open { display: block; }
            .zy64-suggest button {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                padding: 12px 14px;
                border: 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                background: transparent;
                text-align: left;
                font-size: 16px;
                font-family: var(--font-brush), sans-serif;
                letter-spacing: 0.1em;
                color: #222;
                cursor: pointer;
                min-height: 48px;
                touch-action: manipulation;
            }
            .zy64-suggest button:last-child { border-bottom: 0; }
            .zy64-suggest button:hover,
            .zy64-suggest button.active {
                background: rgba(11, 114, 214, 0.08);
            }
            .zy64-suggest .idx {
                font-size: 12px;
                color: #999;
                letter-spacing: 0;
                font-family: sans-serif;
            }
            .zy64-suggest .empty {
                padding: 14px;
                color: #999;
                text-align: center;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <header class="zy64-header">
            <div><a href="index.html" class="meihua-btn">← 返回</a></div>
            <div class="title">周易64卦</div>
            <div style="min-width:64px;"></div>
        </header>

        <div class="zy64-search-wrap">
            <div class="zy64-search">
                <input id="guaSearch" type="search" enterkeyhint="go" autocomplete="off"
                    placeholder="输入卦名搜索，回车跳转介绍…" aria-label="搜索卦名" aria-autocomplete="list" aria-controls="guaSuggest">
                <div id="guaSuggest" class="zy64-suggest" role="listbox"></div>
            </div>
        </div>

        <div id="zy64gua"></div>

        <script src="./static/js/site.js"></script>
        <script src="./static/js/effects.js"></script>
        <script src="./static/js/yi.js"></script>
        <script>
            (function () {
                function ready(fn) {
                    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn);
                    else fn();
                }

                ready(function () {
                    var input = document.getElementById('guaSearch');
                    var box = document.getElementById('guaSuggest');
                    if (!input || !box || typeof zy64guaData === 'undefined') return;

                    var active = -1;
                    var hits = [];

                    function search(q) {
                        q = String(q || '').trim();
                        if (!q) return [];
                        var out = [];
                        for (var i = 0; i < zy64guaData.length; i++) {
                            var name = zy64guaData[i] && zy64guaData[i].name ? String(zy64guaData[i].name) : '';
                            if (!name) continue;
                            if (name.indexOf(q) !== -1 || q.indexOf(name) !== -1) {
                                out.push({ idx: i, name: name });
                            }
                        }
                        // 优先：完全匹配 > 前缀 > 其它
                        out.sort(function (a, b) {
                            var ae = a.name === q ? 0 : (a.name.indexOf(q) === 0 ? 1 : 2);
                            var be = b.name === q ? 0 : (b.name.indexOf(q) === 0 ? 1 : 2);
                            if (ae !== be) return ae - be;
                            return a.idx - b.idx;
                        });
                        return out.slice(0, 12);
                    }

                    function renderSuggest(list) {
                        hits = list;
                        active = list.length ? 0 : -1;
                        if (!list.length) {
                            if (!String(input.value || '').trim()) {
                                box.classList.remove('open');
                                box.innerHTML = '';
                                return;
                            }
                            box.innerHTML = '<div class="empty">未找到匹配的卦名</div>';
                            box.classList.add('open');
                            return;
                        }
                        var html = '';
                        for (var i = 0; i < list.length; i++) {
                            html += '<button type="button" role="option" data-idx="' + list[i].idx + '"' +
                                (i === 0 ? ' class="active"' : '') + '>' +
                                '<span>' + list[i].name + '</span>' +
                                '<span class="idx">第 ' + (list[i].idx + 1) + ' 卦</span></button>';
                        }
                        box.innerHTML = html;
                        box.classList.add('open');
                        var btns = box.querySelectorAll('button');
                        for (var j = 0; j < btns.length; j++) {
                            btns[j].addEventListener('click', function () {
                                var idx = Number(this.getAttribute('data-idx'));
                                if (!isNaN(idx) && typeof openGuaIntro === 'function') openGuaIntro(idx);
                            });
                        }
                    }

                    function setActive(n) {
                        var btns = box.querySelectorAll('button');
                        if (!btns.length) return;
                        if (n < 0) n = btns.length - 1;
                        if (n >= btns.length) n = 0;
                        active = n;
                        for (var i = 0; i < btns.length; i++) {
                            btns[i].className = i === active ? 'active' : '';
                        }
                        if (btns[active] && btns[active].scrollIntoView) {
                            btns[active].scrollIntoView({ block: 'nearest' });
                        }
                    }

                    function goCurrent() {
                        if (active >= 0 && hits[active]) {
                            openGuaIntro(hits[active].idx);
                            return;
                        }
                        var list = search(input.value);
                        if (list.length === 1) {
                            openGuaIntro(list[0].idx);
                        } else if (list.length > 1) {
                            renderSuggest(list);
                        } else if (String(input.value || '').trim()) {
                            renderSuggest([]);
                        }
                    }

                    input.addEventListener('input', function () {
                        renderSuggest(search(input.value));
                    });
                    input.addEventListener('focus', function () {
                        if (String(input.value || '').trim()) renderSuggest(search(input.value));
                    });
                    input.addEventListener('keydown', function (e) {
                        if (e.key === 'ArrowDown') {
                            e.preventDefault();
                            setActive(active + 1);
                        } else if (e.key === 'ArrowUp') {
                            e.preventDefault();
                            setActive(active - 1);
                        } else if (e.key === 'Enter') {
                            e.preventDefault();
                            goCurrent();
                        } else if (e.key === 'Escape') {
                            box.classList.remove('open');
                            input.blur();
                        }
                    });
                    document.addEventListener('click', function (e) {
                        if (!e.target.closest || !e.target.closest('.zy64-search')) {
                            box.classList.remove('open');
                        }
                    });
                });
            })();
        </script>
    </body>
</html>
