<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>心事起卦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/site.css">
    <link rel="stylesheet" href="./static/css/effects.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 100dvh;
        }
        .back-row {
            position: fixed;
            top: max(12px, env(safe-area-inset-top, 0px));
            left: 12px;
            z-index: 10;
        }
        .panel {
            position: relative;
            z-index: 2;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: min(92vw, 560px);
        }
        input {
            flex: 1;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            min-width: 0;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.95);
        }
        button {
            padding: 14px 18px;
            border: none;
            border-radius: 8px;
            background: #0b72d6;
            color: #fff;
            cursor: pointer;
            font-size: 1.15rem;
            min-height: 48px;
            flex-shrink: 0;
        }
        button:hover {
            background: #085fb0;
        }
        @media (max-width: 600px) {
            .panel {
                flex-direction: column;
                align-items: stretch;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="back-row"><a class="meihua-btn" href="index.html">← 返回</a></div>
    <div class="panel">
        <input id="heartInput" type="text" placeholder="请输入卜卦内容（可以为空）" autocomplete="off" enterkeyhint="go">
        <button id="submitBtn" type="button" class="btn-brush">提交</button>
    </div>

    <script src="./static/js/site.js"></script>
    <script src="./static/js/effects.js"></script>
    <script src="./static/js/yi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var input = document.getElementById('heartInput');
            var btn = document.getElementById('submitBtn');
            if (!input || !btn) return;
            btn.addEventListener('click', function () {
                meihuaXinShiWithInput(input.value);
            });
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    meihuaXinShiWithInput(input.value);
                }
            });
        });
    </script>
</body>
</html>
