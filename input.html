<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>心事起卦</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
        }
        body {
            background: url('./static/images/bg.jpg') center center / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel {
            background: rgba(255,255,255,0.9);
            padding: 24px 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
            width: min(90vw, 560px);
        }
        input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #0b72d6;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #085fb0;
        }
        @media (max-width: 600px) {
            .panel {
                flex-direction: column;
                align-items: stretch;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="panel">
        <input id="heartInput" type="text" placeholder="请输入卜卦内容（可以为空）" autocomplete="off">
        <button id="submitBtn" type="button">提交</button>
    </div>

    <script src="./static/js/yi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var input = document.getElementById('heartInput');
            var btn = document.getElementById('submitBtn');
            if (!input || !btn) return;
            btn.addEventListener('click', function () {
                meihuaXinShiWithInput(input.value);
            });
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    meihuaXinShiWithInput(input.value);
                }
            });
        });
    </script>
</body>
</html>
