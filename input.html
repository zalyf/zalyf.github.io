<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>心事起卦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/site.css">
    <link rel="stylesheet" href="./static/css/yi.css">
    <link rel="stylesheet" href="./static/css/effects.css">
    <style>
        /* 与首页一致：标题 + 太极 + 浮层控件 */
        .site-title {
            position: fixed;
            top: max(14px, env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 16;
            margin: 0;
            padding: 0;
            font-size: clamp(1.75rem, 6.5vw, 2.5rem);
            letter-spacing: 0.35em;
            text-indent: 0.35em;
            line-height: 1.1;
            color: rgba(22, 18, 14, 0.88);
            text-shadow:
                0.5px 0.5px 0 rgba(20, 16, 12, 0.3),
                0 2px 12px rgba(255, 255, 255, 0.35);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }

        .back-row {
            position: fixed;
            top: max(12px, env(safe-area-inset-top, 0px));
            left: 12px;
            z-index: 20;
        }

        .center-pane {
            background: transparent;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            width: min(86%, 280px);
        }

        .heart-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            align-items: center;
        }

        /* 提示语：贴在太极图下方，不挤占中央输入区 */
        .hint-below-taiji {
            position: fixed;
            left: 50%;
            top: calc(50% + min(36vw, 210px) + 8px);
            transform: translateX(-50%);
            z-index: 6;
            margin: 0;
            padding: 0 12px;
            text-align: center;
            font-family: var(--font-brush);
            font-size: clamp(1rem, 3.8vw, 1.2rem);
            letter-spacing: 0.2em;
            color: rgba(40, 34, 28, 0.62);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }

        @media (max-width: 480px) {
            .hint-below-taiji {
                top: calc(50% + min(44vw, 180px) + 6px);
                letter-spacing: 0.14em;
            }
        }

        /* 浮在太极上的输入框：半透明毛玻璃，与首页气质一致 */
        #heartInput {
            width: 100%;
            box-sizing: border-box;
            min-height: 50px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 999px;
            font-size: 16px;
            font-family: var(--font-brush), "PingFang SC", "Microsoft YaHei", sans-serif;
            letter-spacing: 0.12em;
            text-align: center;
            color: rgba(22, 18, 14, 0.92);
            outline: none;
            min-width: 0;
            -webkit-appearance: none;
            background: rgba(255, 252, 248, 0.42);
            backdrop-filter: blur(10px) saturate(1.1);
            -webkit-backdrop-filter: blur(10px) saturate(1.1);
            box-shadow:
                0 10px 28px rgba(20, 16, 12, 0.18),
                0 3px 8px rgba(20, 16, 12, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.45);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        #heartInput::placeholder {
            color: rgba(60, 50, 40, 0.55);
            letter-spacing: 0.08em;
        }

        #heartInput:focus {
            border-color: rgba(255, 255, 255, 0.75);
            box-shadow:
                0 14px 32px rgba(20, 16, 12, 0.22),
                0 4px 10px rgba(20, 16, 12, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.55);
            transform: translateY(-2px);
        }

        /* 提交：与首页透明毛笔按钮一致 */
        #submitBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            min-height: 50px;
            padding: 14px 22px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: rgba(22, 18, 14, 0.92);
            font-family: var(--font-brush), "Kaiti SC", "KaiTi", serif;
            font-size: clamp(1.35rem, 4.5vw, 1.75rem);
            font-weight: 400;
            letter-spacing: 0.28em;
            text-indent: 0.14em;
            cursor: pointer;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.55),
                0 0 10px rgba(255, 252, 248, 0.35);
            transition: transform 0.22s ease, opacity 0.22s ease;
            animation: menu-btn-float 5.5s ease-in-out infinite;
        }

        #submitBtn:hover,
        #submitBtn:focus-visible {
            transform: translateY(-4px) scale(1.02);
            opacity: 0.88;
            outline: none;
            animation-play-state: paused;
        }

        #submitBtn:active {
            transform: translateY(0) scale(0.98);
        }

        @keyframes menu-btn-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        @media (prefers-reduced-motion: reduce) {
            #submitBtn { animation: none; }
        }

        @media (max-width: 380px) {
            #submitBtn {
                font-size: clamp(1.2rem, 5vw, 1.45rem);
                letter-spacing: 0.2em;
                min-height: 46px;
            }
            #heartInput {
                letter-spacing: 0.06em;
            }
        }

    </style>
</head>
<body class="index-page">
    <div class="back-row">
        <a class="meihua-btn" href="index.html">← 返回</a>
    </div>

    <h1 class="site-title">心事起卦</h1>

    <div class="hero-stage">
        <div class="taiji-wrap" aria-hidden="true">
            <div class="taiji-glow"></div>
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="taijiClipInput">
                        <circle cx="100" cy="100" r="96"/>
                    </clipPath>
                    <radialGradient id="taijiEdgeFadeInput" cx="50%" cy="50%" r="50%">
                        <stop offset="86%" stop-color="#111111" stop-opacity="0"/>
                        <stop offset="94%" stop-color="#111111" stop-opacity="0.12"/>
                        <stop offset="100%" stop-color="#111111" stop-opacity="0.28"/>
                    </radialGradient>
                </defs>
                <g clip-path="url(#taijiClipInput)">
                    <rect x="0" y="0" width="100" height="200" fill="#ffffff"/>
                    <rect x="100" y="0" width="100" height="200" fill="#111111"/>
                    <circle cx="100" cy="52" r="48" fill="#ffffff"/>
                    <circle cx="100" cy="148" r="48" fill="#111111"/>
                    <circle cx="100" cy="52" r="16" fill="#111111"/>
                    <circle cx="100" cy="148" r="16" fill="#ffffff"/>
                </g>
                <circle cx="100" cy="100" r="96" fill="none" stroke="#111111" stroke-width="0.75" stroke-opacity="0.35"/>
                <circle cx="100" cy="100" r="96" fill="url(#taijiEdgeFadeInput)"/>
            </svg>
        </div>

        <div class="center-pane">
            <form class="heart-form" id="heartForm" action="javascript:void(0)">
                <input id="heartInput" type="text"
                    placeholder="请输入心事（可留空）"
                    autocomplete="off"
                    enterkeyhint="go"
                    maxlength="200"
                    aria-label="卜卦内容">
                <button id="submitBtn" type="submit">起卦☯</button>
            </form>
        </div>
    </div>

    <p class="hint-below-taiji">心诚则灵</p>

    <footer class="site-footer">
        <div class="tagline">弘扬国学，科学算卦</div>
        <a href="index.html">返回首页</a>
    </footer>

    <script src="./static/js/site.js"></script>
    <script src="./static/js/effects.js"></script>
    <script src="./static/js/yi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var input = document.getElementById('heartInput');
            var form = document.getElementById('heartForm');
            if (!input || !form) return;

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (typeof meihuaXinShiWithInput === 'function') {
                    meihuaXinShiWithInput(input.value);
                }
            });

            // 自动聚焦，方便直接输入
            setTimeout(function () {
                try { input.focus(); } catch (err) {}
            }, 200);
        });
    </script>
</body>
</html>
